services:
  lm-lens-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lm-lens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lm-lens}
      POSTGRES_DB: ${POSTGRES_DB:-lm-lens}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lm-lens}"]
      interval: 2s
      timeout: 5s
      retries: 10

  lm-lens-api:
    build: ./backend
    ports:
      - "8080:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://lm-lens:lm-lens@lm-lens-db:5432/lm-lens}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      lm-lens-db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic

  lm-lens-mock:
    build: ./mock-llm
    ports:
      - "8081:8000"
    environment:
      MOCK_LLM_LATENCY_MS: ${MOCK_LLM_LATENCY_MS:-200}
      MOCK_LLM_TOKENS_PER_SECOND: ${MOCK_LLM_TOKENS_PER_SECOND:-50}

  lm-lens-ui:
    build: ./frontend
    ports:
      - "8090:80"
    depends_on:
      - lm-lens-api

volumes:
  pgdata:
